<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeepNet — Coming Soon</title>
  <meta name="description" content="KeepNet — bookings and payments built for UK commercial fisheries. Coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet" />
  <script>
    (function() {
      if (sessionStorage.getItem('kn_access') !== 'ok') {
        var pw = prompt('Password:');
        if (pw !== 'keepnet2026') {
          document.write('<html><body style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#0a2e52;color:white;font-size:18px;"><p>Access denied.</p></body></html>');
          document.close(); throw new Error('denied');
        }
        sessionStorage.setItem('kn_access', 'ok');
      }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a2e52;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(36px, 8vw, 60px);
      font-weight: 800;
      letter-spacing: -1px;
      color: white;
      margin-bottom: 28px;
    }
    .logo span { color: #4ade80; }

    .tagline {
      font-size: clamp(15px, 3vw, 19px);
      color: rgba(255,255,255,0.55);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 48px;
    }

    .form {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 440px;
      width: 100%;
    }
    .form input {
      flex: 1;
      min-width: 220px;
      padding: 15px 22px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .form input::placeholder { color: rgba(255,255,255,0.35); }
    .form input:focus { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.12); }
    .form button {
      background: #4ade80;
      color: #0a2e52;
      font-weight: 800;
      font-size: 15px;
      padding: 15px 28px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
    }
    .form button:hover { opacity: 0.9; }

    .confirm {
      display: none;
      color: #4ade80;
      font-weight: 600;
      font-size: 15px;
      margin-top: 4px;
    }

    .note {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }

    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }
    .footer a { color: rgba(255,255,255,0.3); text-decoration: none; }
  </style>
</head>
<body>

  <div class="logo">Keep<span>Net</span></div>

  <p class="tagline">
    The bookings and payments platform built for UK commercial fisheries.<br>
    Launching Summer 2026.
  </p>

  <form class="form" onsubmit="handleSubmit(event)">
    <input type="email" id="email" placeholder="your@email.com" required />
    <button type="submit">Get early access</button>
  </form>
  <p class="confirm" id="confirm">✓ You're on the list. We'll be in touch.</p>
  <p class="note">No spam. Unsubscribe anytime.</p>

  <p class="footer"><a href="mailto:hello@keepnet.io">hello@keepnet.io</a></p>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.querySelector('.form').style.display = 'none';
      document.getElementById('confirm').style.display = 'block';
      document.querySelector('.note').style.display = 'none';
    }
  </script>

</body>
</html>
